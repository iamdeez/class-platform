spring:
  application:
    name: class-platform
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE:class_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER:class_platform}
    password: ${MYSQL_PASSWORD:class_platform}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: mongodb://${MONGO_ROOT_USERNAME:root}:${MONGO_ROOT_PASSWORD:root}@localhost:27017/${MONGO_DATABASE:class_platform}?authSource=admin

ai-enrichment:
  model: ${AI_ENRICHMENT_MODEL:claude-haiku-4-5}
